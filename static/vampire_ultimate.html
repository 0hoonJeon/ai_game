<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>웹 뱀파이어 서바이벌 - ULTIMATE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        canvas { display: block; }
        #vignette { position: absolute; top: 0; left: 0; right: 0; bottom: 0; box-shadow: inset 0 0 250px rgba(0,0,0,0.9); pointer-events: none; z-index: 1; }
        
        .overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 5, 10, 0.95); z-index: 100; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .active { display: flex !important; }
        
        h1 { font-size: 70px; margin-bottom: 10px; text-align: center; background: linear-gradient(to right, #fbbf24, #ef4444); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        
        .btn { padding: 15px 30px; margin: 10px; font-size: 20px; font-weight: bold; cursor: pointer; border: 2px solid #4b5563; border-radius: 8px; background: #1f2937; color: white; transition: 0.2s; min-width: 250px; text-align: center;}
        .btn:hover { transform: scale(1.05); border-color: #fbbf24; background: #374151; box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
        
        /* 캐릭터 선택 UI */
        .char-grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .char-card { background: #111; border: 3px solid #333; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; width: 180px; }
        .char-card:hover, .char-card.selected { border-color: #3b82f6; background: #1e3a8a; transform: translateY(-10px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.5); }
        .char-img { width: 100px; height: 100px; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        .char-title { font-size: 22px; font-weight: bold; color: #fbbf24; margin-bottom: 10px; }
        .char-desc { font-size: 14px; color: #ccc; }

        /* HUD */
        #hud { position: absolute; top: 20px; left: 280px; pointer-events: none; background: rgba(0, 0, 0, 0.8); padding: 15px 25px; border-radius: 12px; border: 2px solid #444; z-index: 2; box-shadow: 0 0 15px rgba(0,0,0,0.8);}
        .status-row { display: flex; align-items: center; margin-bottom: 12px; }
        .status-label { font-weight: 900; width: 75px; font-size: 16px; text-shadow: 1px 1px 2px black; }
        .gauge-container { width: 300px; height: 26px; background-color: #111; border: 2px solid #222; border-radius: 13px; overflow: hidden; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);}
        .hp-bar { height: 100%; background: linear-gradient(90deg, #991b1b, #ef4444, #fca5a5); width: 100%; transition: width 0.2s; }
        .xp-bar { height: 100%; background: linear-gradient(90deg, #075985, #0ea5e9, #7dd3fc); width: 0%; transition: width 0.2s; }
        .gauge-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; text-align: center; font-size: 15px; font-weight: bold; line-height: 26px; text-shadow: 1px 1px 3px black; }

        #skillPanel { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; border: 2px solid #444; z-index: 2; width: 220px; pointer-events: none; box-shadow: 0 0 15px rgba(0,0,0,0.8);}
        #skillPanel h3 { margin: 0 0 10px 0; color: #fbbf24; text-align: center; font-size: 18px;}
        .skill-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 15px; font-weight: bold; color: #e2e8f0; border-bottom: 1px dashed #444; padding-bottom: 4px;}
        .skill-item .level { color: #34d399; }

        #quitBtn { position: absolute; top: 20px; right: 20px; background: #991b1b; color: white; border: 2px solid #ef4444; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; z-index: 2; transition: 0.2s; box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);}
        #quitBtn:hover { background: #dc2626; transform: scale(1.05); }

        /* 레벨업 및 기타 UI */
        #levelUpUI { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.95); padding: 40px; border: 3px solid #fbbf24; border-radius: 15px; text-align: center; box-shadow: 0 0 50px rgba(251, 191, 36, 0.6); z-index: 10; width: 400px; backdrop-filter: blur(10px);}
        .skill-btn { display: block; width: 100%; margin: 15px auto; padding: 20px; font-size: 20px; font-weight: bold; cursor: pointer; background: #1e293b; color: white; border: 3px solid #475569; border-radius: 10px; transition: all 0.1s; text-align: left; }
        .skill-btn.selected, .skill-btn:hover { border-color: #fbbf24; background: #334155; transform: scale(1.03); box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); color: #fbbf24;}
        
        input[type="text"] { padding: 15px; font-size: 24px; border-radius: 8px; border: 2px solid #555; text-align: center; margin-bottom: 20px; outline: none; background: #222; color: white;}
        input[type="text"]:focus { border-color: #fbbf24; }
        .rank-list { max-height: 400px; overflow-y: auto; width: 600px; background: rgba(0,0,0,0.7); border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #444;}
        .rank-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #333; font-size: 20px;}
        .rank-item.top1 { color: #ffd700; font-weight: 900; font-size: 26px; background: rgba(255, 215, 0, 0.15);}
        .rank-item.top2 { color: #e2e8f0; font-weight: 800; font-size: 24px; background: rgba(226, 232, 240, 0.1);}
        .rank-item.top3 { color: #d97706; font-weight: 800; font-size: 24px; background: rgba(217, 119, 6, 0.1);}
    </style>
</head>
<body>
    <div id="errorLog" style="position: absolute; top: 100px; left: 20px; color: red; z-index: 9999; font-weight: bold; pointer-events: none;"></div>

    <canvas id="gameCanvas"></canvas>
    <div id="vignette"></div>

    <div id="hud" style="display: none;">
        <div class="status-row">
            <span class="status-label" id="levelText" style="color: #fbbf24; font-size: 22px;">LV. 1</span>
            <span style="font-size: 16px; color: #cbd5e1; margin-left: auto;" id="stageText">Stage: 1 (0s)</span>
            <span style="font-size: 16px; color: #facc15; margin-left: 15px;" id="scoreText">Score: 0</span>
        </div>
        <div class="status-row">
            <span class="status-label" style="color: #fca5a5;">HP</span>
            <div class="gauge-container"><div id="hpFill" class="hp-bar"></div><div id="hpValue" class="gauge-text">100 / 100</div></div>
        </div>
        <div class="status-row">
            <span class="status-label" style="color: #bae6fd;">XP</span>
            <div class="gauge-container"><div id="xpFill" class="xp-bar"></div><div id="xpValue" class="gauge-text">0 / 10</div></div>
        </div>
    </div>

    <div id="skillPanel" style="display: none;">
        <h3 id="heroNameUI">획득한 스킬</h3>
        <div id="skillListContainer"></div>
    </div>
    
    <button id="quitBtn" style="display: none;" onclick="userQuitGame()">🏳️ 포기하기</button>

    <div id="startScreen" class="overlay active">
        <h1>ISEKAI SURVIVAL</h1>
        <h2 style="color: #60a5fa; margin-bottom: 20px;">1. 영웅을 선택하세요</h2>
        <div class="char-grid" id="heroGrid">
            </div>

        <h2 style="color: #f87171; margin-bottom: 20px;">2. 난이도를 선택하여 시작</h2>
        <div>
            <button class="btn diff-easy" style="color: #a7f3d0;" onclick="startGame('Easy')">Easy</button>
            <button class="btn diff-normal" style="color: #bae6fd;" onclick="startGame('Normal')">Normal</button>
            <button class="btn diff-hard" style="color: #fca5a5;" onclick="startGame('Hard')">Hard</button>
            <button class="btn diff-hell" style="color: #ef4444; box-shadow: 0 0 10px red;" onclick="startGame('Hell')">HELL</button>
        </div>
        <button class="btn" style="margin-top: 30px; background:#1e3a8a;" onclick="showRanking()">🏆 명예의 전당 보기</button>
    </div>

    <div id="levelUpUI">
        <h2 style="color: #fbbf24; font-size: 40px; margin-top: 0; text-shadow: 0 0 20px rgba(251,191,36,1);">LEVEL UP!</h2>
        <div id="skillOptions"></div>
        <p class="kb-hint">방향키(⬆/⬇)로 선택하고 Enter로 결정</p>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 id="gameOverTitle" style="color: #ef4444; font-size: 80px;">YOU DIED</h1>
        <h2 id="finalScoreText" style="color: #fbbf24; margin-bottom: 30px; font-size: 40px;">Final Score: 0</h2>
        <input type="text" id="playerName" placeholder="용사의 이름을 기록하세요" maxlength="12">
        <button class="btn" style="background:#059669; font-size: 24px;" onclick="submitScore()">점수 기록 및 랭킹 보기</button>
        <button class="btn" onclick="location.reload()">타이틀로 돌아가기</button>
    </div>

    <div id="rankingScreen" class="overlay">
        <h1 style="color:#fbbf24;">🏆 명예의 전당 🏆</h1>
        <div class="rank-list" id="rankListContainer">로딩 중...</div>
        <button class="btn" onclick="closeRanking()">닫기</button>
    </div>

    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('errorLog').innerHTML += `Error: ${message} (Line: ${lineno})<br>`;
        };

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        function getSvgDataUrl(svgStr) {
            if (!svgStr.trim().startsWith('<svg')) {
                svgStr = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="120" height="120">${svgStr}</svg>`;
            } else if (!svgStr.includes('width=')) {
                svgStr = svgStr.replace('<svg', '<svg width="120" height="120"');
            }
            const encoded = btoa(unescape(encodeURIComponent(svgStr)));
            return 'data:image/svg+xml;base64,' + encoded;
        }

        function createSvgImg(svgStr) { 
            const size = 120;
            const offscreen = document.createElement('canvas');
            offscreen.width = size; offscreen.height = size;
            const offCtx = offscreen.getContext('2d');
            const img = new Image(); 
            img.onload = () => { offCtx.drawImage(img, 0, 0, size, size); };
            img.src = getSvgDataUrl(svgStr);
            return offscreen; 
        }

            { mobs: ['golem'], trait: 'supertank', boss: { name: '고대 콜로서스', type: 'tank', hp: 3000, spd: 0.4, svg: `<rect x="2" y="8" width="28" height="24" fill="#1e293b"/><rect x="8" y="0" width="16" height="8" fill="#334155"/><circle cx="12" cy="4" r="2" fill="#ef4444"/><circle cx="20" cy="4" r="2" fill="#ef4444"/>` } },
            { mobs: ['demon', 'angel', 'mageMob'], trait: 'chaos', boss: { name: '세계의 파괴자', type: 'chaos', hp: 5000, spd: 1.0, svg: `<circle cx="16" cy="16" r="14" fill="#000" stroke="#ef4444" stroke-width="2"/><circle cx="16" cy="16" r="4" fill="#fff"/><path d="M16 0 L16 32 M0 16 L32 16" stroke="#ef4444" stroke-width="2"/>` } }
        ];

        const cachedMobs = {};
        mobTemplates.forEach(m => { cachedMobs[m.id] = createSvgImg(m.svg); });

        const difficultySettings = {
            'Easy':   { spdMult: 0.8, hpMult: 0.6, dmgMult: 0.5, spawnMult: 1.0 },
            'Normal': { spdMult: 1.0, hpMult: 1.0, dmgMult: 1.0, spawnMult: 1.2 },
            'Hard':   { spdMult: 1.2, hpMult: 1.5, dmgMult: 1.5, spawnMult: 1.5 },
            'Hell':   { spdMult: 1.5, hpMult: 2.5, dmgMult: 3.0, spawnMult: 2.0 } 
        };

        let gameState = 'START'; 
        let gameTime = 0, stage = 1, screenShakeTime = 0, score = 0;
        let currentDiffName = 'Normal', diffConf = difficultySettings['Normal'];
        let selectedHero = heroes[0], currentSkillChoices = [], selectedSkillIndex = 0;
        
        let bossEffect = { timer: 0, text: '', color: '' };
        let msgEffect = { timer: 0, text: '', color: '' };

        let enemies = [], bullets = [], enemyBullets = [], lasers = [], drops = [], particles = [], floatingTexts = [], novas = [];
        const grassPatches = Array.from({length: 200}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 4 + 2 }));

        let player = {};

        // 🔥 필수 전역 변수 복구 완료!
        const skillNames = {
            magicMissile: "마력 폭발", missileCount: "다중 발사", aura: "전기 오라",
            laser: "파괴 광선", orbit: "수호의 구체", nova: "천벌",
            cooldownRate: "시간 가속", critChance: "약점 포착", regen: "체력 재생"
        };
        const updatableSkills = ['magicMissile', 'missileCount', 'aura', 'laser', 'orbit', 'nova'];

        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (gameState === 'LEVELUP') {
                if (e.key === 'ArrowUp') { selectedSkillIndex = (selectedSkillIndex - 1 + currentSkillChoices.length) % currentSkillChoices.length; updateSkillUI(); e.preventDefault(); }
                if (e.key === 'ArrowDown') { selectedSkillIndex = (selectedSkillIndex + 1) % currentSkillChoices.length; updateSkillUI(); e.preventDefault(); }
                if (e.key === 'Enter' && currentSkillChoices.length > 0) { currentSkillChoices[selectedSkillIndex].action(); closeLevelUp(); }
            }
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        function getDist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
        function calcDmg(base) { const isCrit = Math.random() < player.skills.critChance; return { amt: isCrit ? base * 2 : base, crit: isCrit }; }

        function initHeroSelection() {
            const grid = document.getElementById('heroGrid');
            grid.innerHTML = '';
            heroes.forEach(h => {
                const card = document.createElement('div');
                card.className = `char-card ${h.id === selectedHero.id ? 'selected' : ''}`;
                card.innerHTML = `
                    <img src="${getSvgDataUrl(h.svg)}" class="char-img">
                    <div class="char-title" style="color:${h.color}">${h.name}</div>
                    <div class="char-desc">${h.desc}</div>
                `;
                card.onclick = () => {
                    selectedHero = h;
                    document.querySelectorAll('.char-card').forEach(c => c.classList.remove('selected'));
                    card.classList.add('selected');
                };
                grid.appendChild(card);
            });
        }
        initHeroSelection();

        function startGame(diff) {
            currentDiffName = diff; 
            diffConf = difficultySettings[diff] || difficultySettings['Normal'];
            
            document.getElementById('startScreen').classList.remove('active');
            document.getElementById('hud').style.display = 'block';
            document.getElementById('skillPanel').style.display = 'block';
            document.getElementById('quitBtn').style.display = 'block';
            document.getElementById('heroNameUI').innerText = `[${selectedHero.name}] 스킬`;

            player = {
                x: canvas.width / 2, y: canvas.height / 2, radius: 18, 
                hp: selectedHero.stats.hp, maxHp: selectedHero.stats.hp, 
                speed: selectedHero.stats.speed, xp: 0, xpToNext: 10, level: 1, facingLeft: false,
                skills: { magicMissile: 1, missileCount: 1, aura: 0, laser: 0, orbit: 0, nova: 0, 
                          cooldownRate: selectedHero.stats.cool, critChance: selectedHero.stats.crit, regen: selectedHero.stats.regen },
                img: createSvgImg(selectedHero.svg)
            };

            gameTime = 0; stage = 1; score = 0; screenShakeTime = 0;
            bossEffect = { timer: 0, text: '', color: '' };
            msgEffect = { timer: 0, text: '', color: '' };
            enemies = []; drops = []; bullets = []; enemyBullets = []; lasers = []; novas = []; particles = []; floatingTexts = [];
            
            for(let i=0; i<15; i++) {
                spawnNormalEnemy();
            }
            
            gameState = 'PLAYING'; 
            updateSkillPanel(); 
            gameLoop();

        function userQuitGame() {
            if(gameState === 'PLAYING') {
                player.hp = 0;
                document.getElementById('gameOverTitle').innerText = "GIVE UP";
                gameOver();
            }
        }

        class Particle {
            constructor(x, y, color, sizeMult=1, isFirework=false) {
                this.x = x; this.y = y;
                const angle = Math.random() * Math.PI * 2; const speed = isFirework ? (Math.random() * 12 + 3) : (Math.random() * 5 + 1);
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.color = color; this.alpha = 1; this.size = (Math.random() * 4 + 2) * sizeMult; this.isFirework = isFirework;
            }
            update() { if (this.isFirework) this.vy += 0.2; this.x += this.vx; this.y += this.vy; this.alpha -= this.isFirework ? 0.02 : 0.05; }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.fillStyle = this.color; ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
                ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
            }
        }
        function createFirework(x, y) {
            const cols = ['#ef4444', '#3b82f6', '#10b981', '#facc15', '#a855f7', '#ffffff'];
            const c = cols[Math.floor(Math.random()*cols.length)];
            for (let i = 0; i < 40; i++) particles.push(new Particle(x, y, c, 1.5, true));
        }
        function spawnParticles(x, y, color, count, sizeMult=1) { for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, sizeMult)); }

        class FloatingText {
            constructor(x, y, text, color, isCrit=false, isHuge=false) {
                this.x = x + (Math.random()-0.5)*20; this.y = y; this.text = text; this.color = color;
                this.alpha = 1; this.isCrit = isCrit; this.isHuge = isHuge; this.vy = isHuge ? -1 : (isCrit ? -3 : -2);
            }
            update() { this.y += this.vy; this.alpha -= 0.02; }
            draw() {
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.font = this.isHuge ? '900 40px Arial' : (this.isCrit ? '900 24px Arial' : 'bold 16px Arial');
                ctx.fillStyle = this.isCrit ? '#ff0055' : this.color;
                ctx.textAlign = 'center'; ctx.strokeStyle = '#000'; ctx.lineWidth = this.isHuge ? 6 : (this.isCrit ? 4 : 2);
                ctx.strokeText(this.text, this.x, this.y); ctx.fillText(this.text, this.x, this.y);
                ctx.globalAlpha = 1;
            }
        }

        function spawnNormalEnemy() {
            const conf = stagesConfig[(stage-1) % stagesConfig.length];
            const mobId = conf.mobs[Math.floor(Math.random() * conf.mobs.length)];
            const tpl = mobTemplates.find(m => m.id === mobId);
            if(tpl) enemies.push(new Enemy(tpl, 'normal'));
        }

        class Enemy {
            constructor(tpl, type, isBoss=false) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.max(canvas.width, canvas.height)/2 + 100;
                this.x = player.x + Math.cos(angle)*dist; this.y = player.y + Math.sin(angle)*dist;
                this.type = type; this.isBoss = isBoss; this.hitTimer = 0; this.facingLeft = false;
                
                const hpScale = Math.pow(1.3, stage - 1); 
                const dmgScale = Math.pow(1.15, stage - 1);
                const spdScale = Math.min(2.0, Math.pow(1.05, stage - 1));

                if(isBoss) {
                    this.radius = type === 'main_boss' ? 50 : 30; 
                    this.img = createSvgImg(tpl.svg);
                    this.maxHp = tpl.hp * hpScale * diffConf.hpMult;
                    this.speed = tpl.spd * spdScale * diffConf.spdMult;
                    this.bossType = tpl.type; this.attackTimer = 0; this.pattern = 0;
                    this.dmg = 15 * dmgScale * diffConf.dmgMult;
                } else {
                    this.radius = 16 + (stage * 0.5);
                    this.img = cachedMobs[tpl.id];
                    this.maxHp = 10 * tpl.hp * hpScale * diffConf.hpMult;
                    this.speed = tpl.spd * spdScale * diffConf.spdMult;
                    this.dmg = 1.0 * dmgScale * diffConf.dmgMult;
                }
                this.hp = this.maxHp;
            }
            update() {
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
                this.facingLeft = (this.x > player.x);
                if (this.hitTimer > 0) this.hitTimer--;

                if(this.isBoss) {
                    this.attackTimer++;
                    if (this.bossType === 'dash' && this.attackTimer > 120) {
                        this.x += Math.cos(angle)*150; this.y += Math.sin(angle)*150; this.attackTimer = 0; screenShakeTime=5;
                    } else if (this.bossType === 'magic' && this.attackTimer > 90) {
                        enemyBullets.push(new EnemyBullet(this.x, this.y, player, '#d946ef', this.dmg)); this.attackTimer = 0;
                    } else if (this.bossType === 'sniper' && this.attackTimer > 150) {
                        enemyBullets.push(new EnemyBullet(this.x, this.y, player, '#facc15', this.dmg, 12)); this.attackTimer = 0;
                    } else if (this.bossType === 'laser' && this.attackTimer > 180) {
                        for(let i=0; i<8; i++) {
                            const a = (Math.PI*2/8)*i; const t = {x: this.x+Math.cos(a)*10, y: this.y+Math.sin(a)*10};
                            enemyBullets.push(new EnemyBullet(this.x, this.y, t, '#fca5a5', this.dmg));
                        }
                        this.attackTimer = 0;
                    } else if (this.bossType === 'summon' && this.attackTimer > 200) {
                        for(let i=0; i<3; i++) spawnNormalEnemy();
                        this.attackTimer = 0;
                    } else if (this.bossType === 'tank' && this.attackTimer > 100) {
                         this.hp += this.maxHp * 0.05; this.attackTimer = 0; 
                    } else if (this.bossType === 'chaos' && this.attackTimer > 120) {
                        this.pattern = (this.pattern + 1)%2;
                        if(this.pattern===0) {
                            for(let i=0; i<12; i++) enemyBullets.push(new EnemyBullet(this.x, this.y, {x:this.x+Math.cos(i)*10, y:this.y+Math.sin(i)*10}, '#ef4444', this.dmg));
                        } else {
                            enemyBullets.push(new EnemyBullet(this.x, this.y, player, '#fff', this.dmg, 8));
                        }
                        this.attackTimer = 0;
                    }
                }
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y);
                if (this.facingLeft) ctx.scale(-1, 1);
                
                let size = this.radius * 2.5;
                if(this.img) ctx.drawImage(this.img, -size/2, -size/2, size, size);
                
                if (this.hitTimer > 0) { 
                    ctx.globalCompositeOperation = 'source-atop';
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                    ctx.fillRect(-size/2, -size/2, size, size);
                    ctx.globalCompositeOperation = 'source-over';
                }
                ctx.restore();

                if (this.hp < this.maxHp) {
                    let w = this.isBoss ? 80 : 30;
                    ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(this.x - w/2, this.y - this.radius - 12, w, 6);
                    ctx.fillStyle = this.isBoss ? '#facc15' : '#ef4444'; ctx.fillRect(this.x - w/2, this.y - this.radius - 12, w * (this.hp / this.maxHp), 6);
                }
            }
        }

        class EnemyBullet {
            constructor(x, y, target, color, dmg, speed=6) {
                this.x = x; this.y = y; this.speed = speed; this.radius = 8; this.color = color; this.dmg = dmg;
                const angle = Math.atan2(target.y - y, target.x - x);
                this.velocity = { x: Math.cos(angle) * this.speed, y: Math.sin(angle) * this.speed };
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.globalCompositeOperation = 'source-over';
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class Bullet {
            constructor(x, y, target) {
                this.x = x; this.y = y; this.speed = 18; this.radius = 6 + (player.skills.magicMissile * 1.5); 
                this.dmgInfo = calcDmg(Math.floor(15 * Math.pow(1.3, player.skills.magicMissile)));
                const angle = Math.atan2(target.y - y, target.x - x);
                this.velocity = { x: Math.cos(angle) * this.speed, y: Math.sin(angle) * this.speed };
                this.color = this.dmgInfo.crit ? '#f43f5e' : '#60a5fa';
            }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill(); ctx.globalCompositeOperation = 'source-over';
                particles.push(new Particle(this.x, this.y, this.color, 0.5));
            }
            update() { this.x += this.velocity.x; this.y += this.velocity.y; }
        }

        class LaserBeam {
            constructor(startX, startY, target) {
                this.startX = startX; this.startY = startY; const angle = Math.atan2(target.y - startY, target.x - startX);
                const length = 2000; this.endX = startX + Math.cos(angle) * length; this.endY = startY + Math.sin(angle) * length;
                this.alpha = 1.0; this.width = 15 + (player.skills.laser * 8); 
                this.dmgInfo = calcDmg(Math.floor(30 * Math.pow(1.4, player.skills.laser)));

                enemies.forEach(t => {
                    const dist = Math.abs((this.endX - this.startX)*(this.startY - t.y) - (this.startX - t.x)*(this.endY - this.startY)) / length;
                    if (dist < t.radius + this.width / 2) {
                        const dot = (t.x - this.startX)*(this.endX - this.startX) + (t.y - this.startY)*(this.endY - this.startY);
                        if (dot > 0) {
                            t.hp -= this.dmgInfo.amt; t.hitTimer = 5;
                            spawnParticles(t.x, t.y, '#d946ef', 5, 1.5);
                            floatingTexts.push(new FloatingText(t.x, t.y - 20, this.dmgInfo.amt, '#fbcfe8', this.dmgInfo.crit));
                        }
                    }
                });
                screenShakeTime = 10;
            }
            update() { this.alpha -= 0.05; } 
            draw() {
                ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath(); ctx.moveTo(this.startX, this.startY); ctx.lineTo(this.endX, this.endY);
                ctx.strokeStyle = '#c026d3'; ctx.lineWidth = this.width; ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(this.startX, this.startY); ctx.lineTo(this.endX, this.endY);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = this.width / 3; ctx.stroke();
                ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
            }
        }

        class Nova { 
            constructor() {
                this.x = player.x + (Math.random() - 0.5) * 800; this.y = player.y + (Math.random() - 0.5) * 800;
                this.radius = 120 + (player.skills.nova * 30); this.alpha = 1.0;
                this.dmgInfo = calcDmg(Math.floor(50 * Math.pow(1.5, player.skills.nova)));
                
                enemies.forEach(t => {
                    if (getDist(this.x, this.y, t.x, t.y) < this.radius + t.radius) {
                        t.hp -= this.dmgInfo.amt; t.hitTimer = 5; spawnParticles(t.x, t.y, '#facc15', 5, 2);
                        floatingTexts.push(new FloatingText(t.x, t.y - 20, this.dmgInfo.amt, '#fef08a', this.dmgInfo.crit));
                    }
                });
                screenShakeTime = 15;
            }
            update() { this.alpha -= 0.08; }
            draw() {
                ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
                ctx.fillStyle = 'rgba(250, 204, 21, 0.4)'; ctx.fill();
                ctx.strokeStyle = '#fef08a'; ctx.lineWidth = 5; ctx.stroke();
                ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
            }
        }

        class Drop {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type; 
                this.radius = type === 'xp' ? 8 : 18; this.bobOffset = Math.random() * Math.PI * 2;
                this.magnetized = false; 
            }
            draw() {
                const bob = Math.sin(gameTime * 0.1 + this.bobOffset) * 4;
                if (this.type === 'xp') {
                    ctx.globalCompositeOperation = 'lighter'; ctx.beginPath(); ctx.arc(this.x, this.y + bob, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = '#10b981'; ctx.fill(); ctx.globalCompositeOperation = 'source-over';
                } else if (itemImgs[this.type]) {
                    ctx.drawImage(itemImgs[this.type], this.x - this.radius, this.y - this.radius + bob, this.radius * 2, this.radius * 2);
                }
            }
            update() {
                if(this.magnetized) {
                    const angle = Math.atan2(player.y - this.y, player.x - this.x);
                    this.x += Math.cos(angle) * 20; 
                    this.y += Math.sin(angle) * 20;
                }
            }
        }

        function shootSkills() {
            const mCool = Math.max(5, Math.floor(30 * player.skills.cooldownRate));
            if (player.skills.magicMissile > 0 && gameTime % mCool === 0 && enemies.length > 0) {
                let targets = [...enemies].sort((a, b) => getDist(player.x, player.y, a.x, a.y) - getDist(player.x, player.y, b.x, b.y));
                const count = Math.min(player.skills.missileCount, targets.length);
                for(let i=0; i<count; i++) bullets.push(new Bullet(player.x, player.y, targets[i]));
            }
            const lCool = Math.max(20, Math.floor(90 * player.skills.cooldownRate));
            if (player.skills.laser > 0 && gameTime % lCool === 0 && enemies.length > 0) {
                let nearest = enemies.reduce((p, c) => getDist(player.x, player.y, p.x, p.y) < getDist(player.x, player.y, c.x, c.y) ? p : c);
                lasers.push(new LaserBeam(player.x, player.y, nearest));
            }
            const nCool = Math.max(40, Math.floor(150 * player.skills.cooldownRate));
            if (player.skills.nova > 0 && gameTime % nCool === 0) {
                for(let i=0; i<player.skills.nova; i++) setTimeout(() => novas.push(new Nova()), i * 200);
            }
        }

        function drawAuraAndOrbit() {
            if (player.skills.aura > 0) {
                const aRad = 90 + (player.skills.aura * 25); 
                ctx.globalCompositeOperation = 'lighter'; ctx.beginPath(); ctx.arc(player.x, player.y, aRad, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(56, 189, 248, ${0.1 + Math.random() * 0.1})`; ctx.fill();
                ctx.strokeStyle = 'rgba(125, 211, 252, 0.8)'; ctx.lineWidth = 3; ctx.setLineDash([15, 20]); ctx.lineDashOffset = -gameTime * 2; ctx.stroke();
                ctx.closePath(); ctx.setLineDash([]); ctx.globalCompositeOperation = 'source-over';

                if (gameTime % Math.max(5, Math.floor(10 * player.skills.cooldownRate)) === 0) {
                    const dInfo = calcDmg(Math.floor(18 * Math.pow(1.2, player.skills.aura)));
                    enemies.forEach(t => {
                        if (getDist(player.x, player.y, t.x, t.y) < aRad + t.radius) { t.hp -= dInfo.amt; t.hitTimer = 5; spawnParticles(t.x, t.y, '#7dd3fc', 1); }
                    });
                }
            }

            if (player.skills.orbit > 0) {
                const count = player.skills.orbit + 1; const rad = 110; const speed = gameTime * 0.05;
                const dInfo = calcDmg(Math.floor(25 * Math.pow(1.3, player.skills.orbit)));
                ctx.globalCompositeOperation = 'lighter';
                for(let i=0; i<count; i++) {
                    const angle = speed + (Math.PI * 2 / count) * i;
                    const ox = player.x + Math.cos(angle) * rad; const oy = player.y + Math.sin(angle) * rad;
                    ctx.beginPath(); ctx.arc(ox, oy, 12, 0, Math.PI*2); ctx.fillStyle = '#f87171'; ctx.fill();
                    enemies.forEach(t => { if (getDist(ox, oy, t.x, t.y) < 12 + t.radius && gameTime % 10 === 0) { t.hp -= dInfo.amt; t.hitTimer = 5; spawnParticles(t.x, t.y, '#ef4444', 2); } });
                }
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        function triggerItem(type) {
            if(type === 'magnet') {
                msgEffect = { timer: 90, text: '🧲 자석 획득!', color: '#60a5fa' };
                drops.forEach(d => { d.magnetized = true; });
            } else if (type === 'bomb') {
                msgEffect = { timer: 90, text: '💥 전멸 폭탄!', color: '#ef4444' };
                screenShakeTime = 30;
                enemies.forEach(e => { if(!e.isBoss) { e.hp -= 99999; spawnParticles(e.x, e.y, '#ef4444', 10); } });
            } else if (type === 'summoner') {
                msgEffect = { timer: 90, text: '😈 악마의 계약 발동!', color: '#a855f7' };
                screenShakeTime = 20;
                enemies.forEach(e => { if(!e.isBoss) { e.hp -= 99999; } });
                for(let i=0; i<3; i++) {
                    const tpl = mobTemplates[Math.floor(Math.random()*mobTemplates.length)];
                    const elite = new Enemy(tpl, 'elite', false);
                    elite.radius *= 1.5; elite.maxHp *= 5; elite.hp = elite.maxHp; elite.speed *= 0.8; elite.dmg *= 2;
                    enemies.push(elite);
                }
            }
        }

        function handleCollisions() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                let hit = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (getDist(bullets[i].x, bullets[i].y, enemies[j].x, enemies[j].y) < bullets[i].radius + enemies[j].radius) {
                        enemies[j].hp -= bullets[i].dmgInfo.amt; enemies[j].hitTimer = 5;
                        spawnParticles(bullets[i].x, bullets[i].y, bullets[i].color, 3, 1.5); 
                        bullets.splice(i, 1); hit = true; break;
                    }
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                if (enemies[i].hp <= 0) {
                    const e = enemies[i];
                    if (e.type === 'main_boss') {
                        score += 2000; bossEffect = { timer: 150, text: '🎉 거대 마왕 토벌 완료! 🎉', color: '#facc15' };
                        createFirework(e.x, e.y);
                        drops.push(new Drop(e.x - 30, e.y, 'crystal'), new Drop(e.x + 30, e.y, 'crystal'), new Drop(e.x, e.y - 30, 'crystal'));
                    } else if (e.type === 'mid_boss') {
                        score += 500; bossEffect = { timer: 120, text: '✨ 중간 보스 처치! ✨', color: '#60a5fa' };
                        createFirework(e.x, e.y); drops.push(new Drop(e.x, e.y, 'crystal'));
                    } else if (e.type === 'elite') {
                        score += 300; createFirework(e.x, e.y); drops.push(new Drop(e.x, e.y, 'crystal'), new Drop(e.x, e.y+20, 'meat'));
                    } else {
                        score += 15; spawnParticles(e.x, e.y, '#ef4444', 4, 1);
                        const r = Math.random();
                        if (r < 0.005) drops.push(new Drop(e.x, e.y, 'magnet'));
                        else if (r < 0.01) drops.push(new Drop(e.x, e.y, 'bomb'));
                        else if (r < 0.015) drops.push(new Drop(e.x, e.y, 'summoner'));
                        else if (r < 0.03) drops.push(new Drop(e.x, e.y, 'meat'));
                        else drops.push(new Drop(e.x, e.y, 'xp'));
                    }
                    enemies.splice(i, 1);
                }
            }

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (getDist(enemyBullets[i].x, enemyBullets[i].y, player.x, player.y) < enemyBullets[i].radius + player.radius) {
                    player.hp -= enemyBullets[i].dmg; screenShakeTime = 15; spawnParticles(player.x, player.y, '#f87171', 5);
                    enemyBullets.splice(i, 1); 
                }
            }

            let wasHit = false;
            enemies.forEach(e => {
                if (getDist(player.x, player.y, e.x, e.y) < player.radius + e.radius - 5) {
                    player.hp -= e.dmg; wasHit = true; screenShakeTime = 5; 
                }
            });
            
            if (wasHit && player.hp <= 0 && gameState === 'PLAYING') {
                gameOver();
            }

            for (let i = drops.length - 1; i >= 0; i--) {
                if (getDist(player.x, player.y, drops[i].x, drops[i].y) < player.radius + 30) { 
                    const d = drops[i];
                    if (d.type === 'xp') {
                        player.xp += 1; score += 2; if (player.xp >= player.xpToNext) triggerLevelUp();
                    } else if (d.type === 'meat') {
                        player.hp = Math.min(player.maxHp, player.hp + 60); floatingTexts.push(new FloatingText(player.x, player.y - 30, "+60 HP", '#f87171'));
                    } else if (d.type === 'crystal') {
                        const tSkill = updatableSkills[Math.floor(Math.random() * updatableSkills.length)]; player.skills[tSkill]++;
                        floatingTexts.push(new FloatingText(player.x, player.y - 40, `✨ ${skillNames[tSkill]} +1! ✨`, '#f87171', true));
                        updateSkillPanel(); score += 50;
                    } else {
                        triggerItem(d.type); 
                    }
                    drops.splice(i, 1);
                } else if (getDist(player.x, player.y, drops[i].x, drops[i].y) < player.radius + 150) {
                    drops[i].magnetized = true;
                }
            }
        }

        function updateSkillPanel() {
            const container = document.getElementById('skillListContainer'); container.innerHTML = '';
            for (let key in player.skills) {
                if (player.skills[key] > 0 || key === 'cooldownRate' || key === 'critChance' || key === 'regen') {
                    let disp = player.skills[key];
                    if (key === 'cooldownRate') disp = `${Math.round((1 - disp)*100)}%`;
                    else if (key === 'critChance' || key === 'regen') disp = `${Math.round(disp*100)}%`;
                    if(skillNames[key]) container.innerHTML += `<div class="skill-item"><span>${skillNames[key].split(' ')[0]}</span> <span class="level">LV.${disp}</span></div>`;
                }
            }
        }

        function triggerLevelUp() {
            gameState = 'LEVELUP';
            player.level++; player.xp -= player.xpToNext; player.xpToNext = Math.floor(player.xpToNext * 1.35);

            const choices = [
                { name: "✨ 마력 폭발 (미사일 딜/크기 증가)", action: () => player.skills.magicMissile++ },
                { name: "☄️ 다중 발사 (미사일 개수 증가)", action: () => player.skills.missileCount++ },
                { name: "⚡ 전기 오라 (주변 광역 지속 딜)", action: () => player.skills.aura++ },
                { name: "🔦 파괴 광선 (관통 극딜 레이저)", action: () => player.skills.laser++ },
                { name: "🪐 수호의 구체 (빙빙 도는 방어막)", action: () => player.skills.orbit++ },
                { name: "🌩️ 천벌 (주기적 화면 벼락 폭격)", action: () => player.skills.nova++ },
                { name: "⏳ 시간 가속 (모든 쿨타임 감소)", action: () => player.skills.cooldownRate *= 0.85 },
                { name: "🎯 약점 포착 (크리티컬 확률 +10%)", action: () => player.skills.critChance += 0.1 },
                { name: "🍖 강인한 체력 (최대 체력 +50 & 회복)", action: () => { player.maxHp += 50; player.hp += 50; } },
                { name: "👟 날개 달린 신발 (이동 속도 증가)", action: () => player.speed += 1.5 }
            ];

            currentSkillChoices = choices.sort(() => 0.5 - Math.random()).slice(0, 3);
            selectedSkillIndex = 0; updateSkillUI();
            document.getElementById('levelUpUI').style.display = 'block';
        }

        function updateSkillUI() {
            const container = document.getElementById('skillOptions'); container.innerHTML = '';
            currentSkillChoices.forEach((skill, index) => {
                const btn = document.createElement('button'); btn.className = `skill-btn ${index === selectedSkillIndex ? 'selected' : ''}`;
                btn.innerText = skill.name; btn.onmouseover = () => { selectedSkillIndex = index; updateSkillUI(); };
                btn.onclick = () => { skill.action(); closeLevelUp(); }; container.appendChild(btn);
            });
        }
        function closeLevelUp() { document.getElementById('levelUpUI').style.display = 'none'; updateSkillPanel(); gameState = 'PLAYING'; }

        function updateHUD() {
            document.getElementById('levelText').innerText = `LV. ${player.level}`;
            document.getElementById('stageText').innerText = `Stage: ${stage} (${Math.floor(gameTime/60)}s)`;
            document.getElementById('scoreText').innerText = `Score: ${Math.floor(score)}`;
            document.getElementById('hpValue').innerText = `${Math.floor(player.hp)} / ${player.maxHp}`;
            document.getElementById('xpValue').innerText = `${player.xp} / ${player.xpToNext}`;
            document.getElementById('hpFill').style.width = Math.max(0, (player.hp / player.maxHp) * 100) + '%';
            document.getElementById('xpFill').style.width = Math.min(100, (player.xp / player.xpToNext) * 100) + '%';
        }

        function gameOver() {
            if(gameState === 'GAMEOVER') return;
            gameState = 'GAMEOVER';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('skillPanel').style.display = 'none';
            document.getElementById('quitBtn').style.display = 'none';
            document.getElementById('gameOverScreen').classList.add('active');
            document.getElementById('finalScoreText').innerText = `Final Score: ${Math.floor(score)}`;
        }

        function getRankings() { const s = localStorage.getItem('vampire_ranks_v2'); return s ? JSON.parse(s) : []; }
        function submitScore() {
            const name = document.getElementById('playerName').value || '무명 용사';
            let ranks = getRankings();
            ranks.push({ name: name, score: Math.floor(score), difficulty: currentDiffName, hero: selectedHero.name });
            ranks.sort((a, b) => b.score - a.score); ranks = ranks.slice(0, 100);
            localStorage.setItem('vampire_ranks_v2', JSON.stringify(ranks));
            showRanking();
        }
        function showRanking() {
            document.querySelectorAll('.overlay').forEach(e=>e.classList.remove('active'));
            document.getElementById('rankingScreen').classList.add('active');
            const ranks = getRankings(); const container = document.getElementById('rankListContainer'); container.innerHTML = '';
            if(ranks.length === 0) container.innerHTML = '<p style="text-align:center;">아직 등록된 랭킹이 없습니다.</p>';
            else ranks.forEach((r, i) => {
                let rankClass = '', icon = `#${i+1}`;
                if (i === 0) { rankClass = 'top1'; icon = trophyGold; } else if (i === 1) { rankClass = 'top2'; icon = trophySilver; } else if (i === 2) { rankClass = 'top3'; icon = trophyBronze; }
                container.innerHTML += `<div class="rank-item ${rankClass}"><span>${icon} ${r.name} <span style="font-size:14px;color:#888;">[${r.hero} / ${r.difficulty}]</span></span><span>${r.score.toLocaleString()} PTS</span></div>`;
            });
        }
        function closeRanking() { document.getElementById('rankingScreen').classList.remove('active'); if (gameState === 'START') document.getElementById('startScreen').classList.add('active'); else location.reload(); }

        // --- 메인 게임 루프 ---
        function gameLoop() {
            if (gameState !== 'PLAYING') { if (gameState === 'LEVELUP') requestAnimationFrame(gameLoop); return; }

            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (screenShakeTime > 0) { 
                ctx.translate((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20); 
                screenShakeTime--; 
            }

            ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, canvas.width, canvas.height); 
            ctx.fillStyle = '#1e293b'; grassPatches.forEach(p => ctx.fillRect(p.x, p.y, p.size, p.size * 2));

            if ((keys['w'] || keys['arrowup']) && player.y > player.radius) player.y -= player.speed;
            if ((keys['s'] || keys['arrowdown']) && player.y < canvas.height - player.radius) player.y += player.speed;
            if ((keys['a'] || keys['arrowleft']) && player.x > player.radius) { player.x -= player.speed; player.facingLeft = true; }
            if ((keys['d'] || keys['arrowright']) && player.x < canvas.width - player.radius) { player.x += player.speed; player.facingLeft = false; }

            score += 0.05 * diffConf.dmgMult; 
            if (gameTime % 60 === 0 && player.skills.regen > 0) player.hp = Math.min(player.maxHp, player.hp + player.maxHp * player.skills.regen);

            if (gameTime > 0 && gameTime % 1800 === 0) { 
                stage++;
                const conf = stagesConfig[(stage-1) % stagesConfig.length];
                enemies.push(new Enemy(conf.boss, 'main_boss', true));
                bossEffect = { timer: 120, text: `⚠️ ${conf.boss.name} 강림 ⚠️`, color: 'rgba(153, 27, 27, 0.6)' };
                screenShakeTime = 40; 
            }
            if (gameTime > 0 && gameTime % 1800 === 900) { 
                enemies.push(new Enemy(midBossTemplate, 'mid_boss', true));
                bossEffect = { timer: 60, text: '😈 심연의 감시자 출현 😈', color: 'rgba(107, 33, 168, 0.5)' };
                screenShakeTime = 20;
            }

            const conf = stagesConfig[(stage-1) % stagesConfig.length];
            const sMult = conf.trait === 'swarm' ? 0.6 : (conf.trait === 'supertank' ? 3.0 : 1.0); 
            const spawnInterval = Math.max(5, 20 - stage * 1.5) * diffConf.spawnMult * sMult;
            if (gameTime % Math.floor(spawnInterval) === 0 && enemies.length < 350) {
                const count = conf.trait === 'swarm' ? (4 + stage) : (2 + stage/2);
                for(let i=0; i<count; i++) spawnNormalEnemy();
            }

            shootSkills();
            
            drops.forEach(d => { d.update(); d.draw(); });
            for(let i=lasers.length-1; i>=0; i--) { lasers[i].update(); lasers[i].draw(); if(lasers[i].alpha <= 0) lasers.splice(i, 1); }
            for(let i=novas.length-1; i>=0; i--) { novas[i].update(); novas[i].draw(); if(novas[i].alpha <= 0) novas.splice(i, 1); }
            bullets.forEach(b => { b.update(); b.draw(); });
            enemyBullets.forEach(b => { b.update(); b.draw(); });
            
            enemies.sort((a,b) => (a.type === 'normal' ? -1 : 1)).forEach(e => { e.update(); e.draw(); });
            
            drawAuraAndOrbit();
            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].alpha <= 0) particles.splice(i, 1); }

            ctx.save();
            ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = 0.4;
            if (player.img) ctx.drawImage(player.img, player.x - 24, player.y - 24, 48, 48); 
            ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';
            
            ctx.translate(player.x, player.y);
            if (player.facingLeft) ctx.scale(-1, 1);
            const bobbing = (keys['w'] || keys['s'] || keys['a'] || keys['d']) ? Math.sin(gameTime * 0.5) * 4 : 0;
            if (player.img) ctx.drawImage(player.img, -24, -24 + bobbing, 48, 48); 
            ctx.restore();
            
            ctx.setTransform(1, 0, 0, 1, 0, 0); 
            if (screenShakeTime > 0) ctx.translate((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20); 
            ctx.beginPath(); ctx.ellipse(player.x, player.y + 20, 15, 5, 0, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();

            for (let i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); floatingTexts[i].draw(); if (floatingTexts[i].alpha <= 0) floatingTexts.splice(i, 1); }

            handleCollisions();
            updateHUD();

            if (bossEffect.timer > 0) {
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                if(bossEffect.color) { ctx.fillStyle = bossEffect.color; ctx.fillRect(0, 0, canvas.width, canvas.height); }
                ctx.save(); ctx.translate(canvas.width/2, canvas.height/2);
                ctx.scale(1 + (150 - bossEffect.timer)*0.005, 1 + (150 - bossEffect.timer)*0.005);
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.font = '900 60px Arial'; ctx.lineWidth = 8; ctx.strokeStyle = '#000';
                ctx.fillStyle = bossEffect.timer % 10 < 5 ? '#fff' : '#ef4444';
                ctx.strokeText(bossEffect.text, 0, 0); ctx.fillText(bossEffect.text, 0, 0); ctx.restore();
                bossEffect.timer--;
            }
            if (msgEffect.timer > 0) {
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
                ctx.save(); ctx.translate(canvas.width/2, canvas.height/4); 
                ctx.scale(1 + Math.sin(gameTime * 0.1) * 0.1, 1 + Math.sin(gameTime * 0.1) * 0.1);
                ctx.textAlign = 'center'; ctx.font = '900 50px Arial'; ctx.lineWidth = 8; ctx.strokeStyle = '#000';
                ctx.fillStyle = msgEffect.color; 
                ctx.strokeText(msgEffect.text, 0, 0); ctx.fillText(msgEffect.text, 0, 0); ctx.restore();
                msgEffect.timer--;
            }

            gameTime++; 
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
    </script>
</body>
</html>
