<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SNAKE // TERMINAL</title>
<style>
  :root {
    --amber: #ffb000;
    --amber-bright: #ffd166;
    --amber-dim: #4a3300;
    --screen-bg: #1a1306;
    --screen-bg-deep: #0f0a03;
    --case: #2b2823;
    --case-light: #3a3630;
    --ink: #ffb000;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #100e0b;
    font-family: 'Courier New', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body {
    background-image:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.03), transparent 60%);
  }

  .terminal-unit {
    background: linear-gradient(160deg, var(--case-light), var(--case) 60%);
    border-radius: 18px;
    padding: 28px 28px 22px;
    box-shadow:
      0 30px 60px rgba(0,0,0,0.55),
      inset 0 1px 0 rgba(255,255,255,0.06),
      inset 0 -2px 4px rgba(0,0,0,0.4);
    width: min(640px, 92vw);
  }

  .unit-label {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px 14px;
    color: #6b665c;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .unit-label .model {
    color: #8a8478;
  }

  .screen {
    position: relative;
    background: radial-gradient(ellipse at 50% 0%, var(--screen-bg) 0%, var(--screen-bg-deep) 100%);
    border-radius: 6px;
    padding: 22px;
    box-shadow:
      inset 0 0 40px rgba(0,0,0,0.85),
      inset 0 0 4px rgba(0,0,0,0.9);
    overflow: hidden;
  }

  /* scanline + vignette overlay */
  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.025) 0px,
      rgba(255,255,255,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 5;
  }
  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 90px 20px rgba(0,0,0,0.7);
    pointer-events: none;
    z-index: 6;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    color: var(--ink);
    margin-bottom: 14px;
    text-shadow: 0 0 8px rgba(255,176,0,0.55);
  }

  .hud .block { line-height: 1.1; }

  .hud .tag {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(255,176,0,0.55);
    text-transform: uppercase;
  }

  .hud .value {
    font-size: 26px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .hud .best .value { font-size: 18px; color: rgba(255,176,0,0.75); }

  #board {
    display: block;
    width: 100%;
    image-rendering: pixelated;
    background: transparent;
  }

  .message-layer {
    position: absolute;
    inset: 22px;
    margin-top: 56px;
    display: none;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
    flex-direction: column;
    gap: 10px;
  }

  .message-layer.show { display: flex; }

  .message-layer .headline {
    font-size: 22px;
    letter-spacing: 0.08em;
    color: var(--amber-bright);
    text-shadow: 0 0 14px rgba(255,176,0,0.8);
  }

  .message-layer .sub {
    font-size: 12px;
    color: rgba(255,176,0,0.7);
    letter-spacing: 0.05em;
    max-width: 320px;
    line-height: 1.6;
  }

  .message-layer .sub kbd {
    background: rgba(255,176,0,0.12);
    border: 1px solid rgba(255,176,0,0.4);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 11px;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    padding: 0 2px;
  }

  .led-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .led {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #3a2a08;
    box-shadow: inset 0 0 2px rgba(0,0,0,0.6);
    transition: background 0.15s, box-shadow 0.15s;
  }

  .led.on {
    background: var(--amber);
    box-shadow: 0 0 6px 2px rgba(255,176,0,0.85);
  }

  .hint {
    font-size: 10.5px;
    color: #6b665c;
    letter-spacing: 0.04em;
  }

  .dpad {
    display: none;
    grid-template-columns: 44px 44px 44px;
    grid-template-rows: 44px 44px 44px;
    gap: 6px;
    justify-content: center;
    margin-top: 18px;
  }

  .dpad button {
    background: linear-gradient(160deg, var(--case-light), var(--case));
    border: none;
    border-radius: 10px;
    color: var(--amber);
    font-size: 16px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:active {
    transform: translateY(1px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .dpad .up { grid-column: 2; grid-row: 1; }
  .dpad .left { grid-column: 1; grid-row: 2; }
  .dpad .center { grid-column: 2; grid-row: 2; visibility: hidden; }
  .dpad .right { grid-column: 3; grid-row: 2; }
  .dpad .down { grid-column: 2; grid-row: 3; }

  @media (max-width: 560px) {
    .dpad { display: grid; }
  }
</style>
</head>
<body>

  <div class="terminal-unit">
    <div class="unit-label">
      <span>FIELD&nbsp;UNIT&nbsp;7</span>
      <span class="model">SNK&#8209;CRT&nbsp;MK.II</span>
    </div>

    <div class="screen">
      <div class="hud">
        <div class="block">
          <div class="tag">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="block best">
          <div class="tag">Best</div>
          <div class="value" id="best">0</div>
        </div>
      </div>

      <canvas id="board" width="400" height="400"></canvas>

      <div class="message-layer" id="overlay">
        <div class="headline" id="overlay-title">SYSTEM READY</div>
        <div class="sub" id="overlay-sub">
          방향키 또는 <kbd>WASD</kbd>로 이동하세요.<br>
          <kbd>SPACE</kbd> 또는 화면 터치로 시작합니다.
        </div>
      </div>
    </div>

    <div class="footer-row">
      <div class="led-row">
        <div class="led" id="led1"></div>
        <div class="led" id="led2"></div>
        <div class="led" id="led3"></div>
      </div>
      <div class="hint">↑ ↓ ← → / WASD&nbsp;&nbsp;·&nbsp;&nbsp;SPACE 일시정지</div>
    </div>

    <div class="dpad" id="dpad">
      <button class="up" data-dir="up">▲</button>
      <button class="left" data-dir="left">◀</button>
      <div class="center"></div>
      <button class="right" data-dir="right">▶</button>
      <button class="down" data-dir="down">▼</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub = document.getElementById('overlay-sub');
  const leds = [document.getElementById('led1'), document.getElementById('led2'), document.getElementById('led3')];
  const dpad = document.getElementById('dpad');

  const GRID = 20;                 // 20 x 20 cells
  const CELL = canvas.width / GRID;
  const BASE_SPEED_MS = 130;       // starting tick interval
  const MIN_SPEED_MS = 70;         // fastest allowed
  const SPEEDUP_EVERY = 5;         // speed up every N food eaten

  const COLORS = {
    grid: 'rgba(255,176,0,0.05)',
    gridDot: 'rgba(255,176,0,0.09)',
    snakeBody: '#ffb000',
    snakeBodyAlt: '#cc8c00',
    snakeHead: '#ffe9b0',
    food: '#ffd166',
    foodCore: '#1a1306'
  };

  let snake, dir, nextDir, food, score, best, tickMs, loopHandle, running, paused, growth;

  best = Number(localStorage.getItem('snake-best') || 0);
  bestEl.textContent = best;

  function resetState() {
    const cx = Math.floor(GRID / 2);
    const cy = Math.floor(GRID / 2);
    snake = [
      { x: cx - 1, y: cy },
      { x: cx - 2, y: cy },
      { x: cx - 3, y: cy }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    growth = 0;
    tickMs = BASE_SPEED_MS;
    scoreEl.textContent = score;
    placeFood();
  }

  function placeFood() {
    let pos;
    do {
      pos = { x: randInt(GRID), y: randInt(GRID) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;
  }

  function randInt(n) { return Math.floor(Math.random() * n); }

  function setDir(dx, dy) {
    // prevent reversing directly into self
    if (snake.length > 1 && dx === -dir.x && dy === -dir.y) return;
    nextDir = { x: dx, y: dy };
  }

  const KEY_MAP = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0]
  };

  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') {
      e.preventDefault();
      if (!running) startGame();
      else togglePause();
      return;
    }
    const mapped = KEY_MAP[e.key];
    if (mapped) {
      e.preventDefault();
      if (!running) { startGame(); }
      if (paused) return;
      setDir(mapped[0], mapped[1]);
    }
  });

  dpad.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    if (!running) startGame();
    if (paused) return;
    const d = btn.dataset.dir;
    if (d === 'up') setDir(0, -1);
    if (d === 'down') setDir(0, 1);
    if (d === 'left') setDir(-1, 0);
    if (d === 'right') setDir(1, 0);
  });

  overlay.addEventListener('click', () => {
    if (!running) startGame();
  });

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      showOverlay('PAUSED', 'SPACE 키를 눌러 계속하세요.');
      stopLoop();
    } else {
      hideOverlay();
      startLoop();
    }
  }

  function showOverlay(title, sub) {
    overlayTitle.textContent = title;
    overlaySub.innerHTML = sub;
    overlay.classList.add('show');
  }

  function hideOverlay() {
    overlay.classList.remove('show');
  }

  function startGame() {
    resetState();
    running = true;
    paused = false;
    hideOverlay();
    startLoop();
  }

  function startLoop() {
    stopLoop();
    loopHandle = setInterval(tick, tickMs);
  }

  function stopLoop() {
    if (loopHandle) clearInterval(loopHandle);
    loopHandle = null;
  }

  function restartLoopWithNewSpeed() {
    stopLoop();
    loopHandle = setInterval(tick, tickMs);
  }

  function tick() {
    dir = nextDir;
    const head = snake[0];
    const newHead = { x: head.x + dir.x, y: head.y + dir.y };

    // wall collision
    if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
      return gameOver();
    }
    // self collision
    if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
      return gameOver();
    }

    snake.unshift(newHead);

    if (newHead.x === food.x && newHead.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      blinkLed();
      placeFood();
      if (score % (SPEEDUP_EVERY * 10) === 0 && tickMs > MIN_SPEED_MS) {
        tickMs = Math.max(MIN_SPEED_MS, tickMs - 8);
        restartLoopWithNewSpeed();
      }
    } else {
      snake.pop();
    }

    draw();
  }

  function blinkLed() {
    const led = leds[score % leds.length];
    led.classList.add('on');
    setTimeout(() => led.classList.remove('on'), 160);
  }

  function gameOver() {
    running = false;
    stopLoop();
    leds.forEach(l => l.classList.remove('on'));
    if (score > best) {
      best = score;
      localStorage.setItem('snake-best', best);
      bestEl.textContent = best;
      showOverlay('NEW BEST · ' + score, 'SPACE 또는 화면 터치로 다시 시작합니다.');
    } else {
      showOverlay('GAME OVER · ' + score, 'SPACE 또는 화면 터치로 다시 시작합니다.');
    }
    draw(true);
  }

  function draw(crashed) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // dotted grid
    ctx.fillStyle = COLORS.gridDot;
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillRect(x * CELL + CELL / 2 - 0.5, y * CELL + CELL / 2 - 0.5, 1, 1);
      }
    }

    // food (diamond pulse)
    const fx = food.x * CELL + CELL / 2;
    const fy = food.y * CELL + CELL / 2;
    ctx.save();
    ctx.translate(fx, fy);
    ctx.rotate(Math.PI / 4);
    const r = CELL * 0.32;
    ctx.fillStyle = COLORS.food;
    ctx.shadowColor = 'rgba(255,209,102,0.8)';
    ctx.shadowBlur = 10;
    ctx.fillRect(-r, -r, r * 2, r * 2);
    ctx.restore();

    // snake
    snake.forEach((seg, i) => {
      const x = seg.x * CELL;
      const y = seg.y * CELL;
      const pad = i === 0 ? 1 : 2;
      ctx.fillStyle = i === 0 ? COLORS.snakeHead : (i % 2 === 0 ? COLORS.snakeBody : COLORS.snakeBodyAlt);
      ctx.shadowColor = 'rgba(255,176,0,0.55)';
      ctx.shadowBlur = i === 0 ? 9 : 4;
      roundRect(ctx, x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, 3);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // initial idle state
  resetState();
  draw();
})();
</script>
</body>
</html>
